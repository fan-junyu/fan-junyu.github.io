<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Junyu Fan</title>
  <link rel="icon" href="/assets/icon/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="header-inner">
        <nav class="top-nav" aria-label="Primary">
          <a href="/">About</a>
          <a href="/topic.html">Topic</a>
          <a href="/contact.html" class="active">Contact</a>

          <div class="lang-wrap" aria-label="Language switcher">
            <span class="lang-current">EN</span>
            <button class="lang-switch" type="button" data-lang-toggle>中文</button>
          </div>
        </nav>
      </div>
    </header>

    <main class="site-main">
     <section class="page-wrap simple-page">
  <h1 class="page-title">Hello, my friend!</h1>
  <p class="page-body">
    I'm more than happy to receive random messages from you.
  </p>

  <ul class="contact-list">
  <li>
    <span class="contact-label">Email</span>
    <a href="mailto:fjyceleste@outlook.com">fjyceleste@outlook.com</a>
  </li>

  <li class="message-trigger-row">
    <span class="contact-label">Or</span>
    <button type="button" class="message-trigger" id="message-trigger">
      Leave a message here
    </button>
  </li>
</ul>

<div class="contact-form-block" id="contact-form-block" hidden>
  <form action="https://formspree.io/f/xqewpyla" method="POST" class="contact-form">

      <!-- honeypot -->
  <input type="text" name="_gotcha" style="display:none">
    <label>
      <span>Name</span>
      <input type="text" name="name" placeholder="How should I address you?" />
    </label>

    <label>
      <span>Email</span>
      <input type="email" name="email" placeholder="you@example.com" required />
    </label>

    <label>
      <span>Message</span>
      <textarea name="message" rows="5" placeholder="Write here..."></textarea>
    </label>

    <button type="submit" class="form-submit">Send</button>
  </form>
</div>

  <script src="/assets/js/main.js"></script>
  <script>
  const messageTrigger = document.getElementById("message-trigger");
  const contactFormBlock = document.getElementById("contact-form-block");

  messageTrigger.addEventListener("click", () => {
    const isHidden = contactFormBlock.hasAttribute("hidden");

    if (isHidden) {
      contactFormBlock.removeAttribute("hidden");
      messageTrigger.textContent = "Hide message form";
    } else {
      contactFormBlock.setAttribute("hidden", "");
      messageTrigger.textContent = "Leave a message here";
    }
  });
</script>
</body>
</html>
