<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junyu Fan</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f1ea;
      --text: #1e1b18;
      --muted: #6d665f;
      --line: rgba(30, 27, 24, 0.08);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", Times, serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      min-height: 100vh;
      max-width: 1240px;
      margin: 0 auto;
      padding: 96px 72px 88px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .layout {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(340px, 720px) minmax(240px, 360px);
      gap: 72px;
      align-items: end;
    }

    .image-block {
      width: 100%;
    }

    .photo-frame {
      width: 100%;
      aspect-ratio: 21 / 9;
      overflow: hidden;
      border-radius: 4px;
      background: #d8cec1;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.96) contrast(1.02);
    }

    .caption {
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .text-block {
      max-width: 320px;
      padding-bottom: 8px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.08;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 22px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
    }

    .bio {
      margin: 0;
      font-size: 17px;
      line-height: 1.95;
      color: var(--text);
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--line);
      margin: 0 0 20px;
    }

    @media (max-width: 980px) {
      .page {
        padding: 72px 32px 64px;
      }

      .layout {
        grid-template-columns: 1fr;
        gap: 34px;
        align-items: start;
      }

      .text-block {
        max-width: 560px;
        padding-bottom: 0;
      }

      .photo-frame {
        aspect-ratio: 16 / 9;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 40px 20px 36px;
      }

      .layout {
        gap: 24px;
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 14px;
        margin-bottom: 18px;
      }

      .bio {
        font-size: 16px;
        line-height: 1.85;
      }

      .caption {
        font-size: 12px;
      }

      .photo-frame {
        aspect-ratio: 16 / 10;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="layout">
      <div class="image-block">
        <div class="photo-frame">
          <img src="photo0.jpg" alt="Junyu Fan holding two photobooth portraits" />
        </div>
        <p class="caption">
          A warm-toned still, with photobooth portraits held in hand.
        </p>
      </div>

      <div class="text-block">
        <div class="divider"></div>
        <h1>Junyu Fan</h1>
        <p class="subtitle">MD student currently based in Heidelberg</p>
        <p class="bio">
          Interested in psychiatry, psychotherapy, and the intersection of mind and
          philosophy. Exploring human experience through medicine and the humanities.
        </p>
      </div>
    </section>
  </main>
</body>
</html>
