<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junyu Fan</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f5f5f3;
      color: #111;
    }

    .container {
      min-height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 100%;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 48px;
      align-items: center;
    }

    .photo-wrap {
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      border-radius: 16px;
      background: #ddd;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .text {
      max-width: 620px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 56px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 24px;
      font-size: 20px;
      line-height: 1.5;
      color: #444;
    }

    .bio {
      margin: 0;
      font-size: 21px;
      line-height: 1.8;
      color: #222;
    }

    @media (max-width: 900px) {
      .card {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .photo-wrap {
        max-width: 360px;
      }

      h1 {
        font-size: 42px;
      }

      .bio {
        font-size: 19px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 28px 18px;
      }

      h1 {
        font-size: 34px;
      }

      .subtitle {
        font-size: 18px;
      }

      .bio {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <div class="photo-wrap">
        <img src="photo1.jpg" alt="Portrait of Junyu Fan" />
      </div>

      <div class="text">
        <h1>Junyu Fan</h1>
        <p class="subtitle">MD student currently based in Heidelberg</p>
        <p class="bio">
          Interested in psychiatry, psychotherapy, and the intersection of mind and
          philosophy. Exploring human experience through medicine and the humanities.
        </p>
      </div>
    </section>
  </main>
</body>
</html>
