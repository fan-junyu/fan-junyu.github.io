<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junyu Fan</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f7f6f2;
      color: #1a1a1a;
      font-family: Georgia, "Times New Roman", serif;
    }

    .page {
      min-height: 100vh;
      max-width: 1280px;
      margin: 0 auto;
      padding: 96px 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .layout {
      width: 100%;
      display: grid;
      grid-template-columns: 360px minmax(320px, 520px);
      gap: 88px;
      align-items: center;
      justify-content: center;
    }

    .photo {
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      border-radius: 6px;
      background: #ddd;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .text {
      max-width: 520px;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 56px;
      line-height: 1.02;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 28px;
      font-size: 18px;
      line-height: 1.6;
      color: #666;
    }

    .bio {
      margin: 0;
      font-size: 24px;
      line-height: 1.75;
      color: #222;
    }

    @media (max-width: 980px) {
      .page {
        padding: 72px 32px;
      }

      .layout {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .photo {
        max-width: 360px;
      }

      h1 {
        font-size: 42px;
      }

      .bio {
        font-size: 20px;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 40px 20px;
      }

      h1 {
        font-size: 34px;
      }

      .subtitle {
        font-size: 16px;
      }

      .bio {
        font-size: 18px;
        line-height: 1.7;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="layout">
      <div class="photo">
        <img src="your-photo.jpg" alt="Portrait of Junyu Fan" />
      </div>

      <div class="text">
        <h1>Junyu Fan</h1>
        <p class="subtitle">MD student currently based in Heidelberg</p>
        <p class="bio">
          Interested in psychiatry, psychotherapy, and the intersection of mind and
          philosophy. Exploring human experience through medicine and the humanities.
        </p>
      </div>
    </section>
  </main>
</body>
</html>
