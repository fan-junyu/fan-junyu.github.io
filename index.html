<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Junyu Fan</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f2ee;
      color: #1c1c1c;
      font-family: Georgia, "Times New Roman", serif;
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 100px 28px 120px;
    }

    /* 图片区域（电影画幅） */
    .image-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 4px;
      margin-bottom: 56px;
      background: #ddd;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 文字区域 */
    .text {
      max-width: 640px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 40px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 0 0 32px;
      font-size: 15px;
      color: #6a6a6a;
    }

    .bio {
      margin: 0;
      font-size: 20px;
      line-height: 1.9;
      color: #222;
    }

    /* 移动端 */
    @media (max-width: 640px) {
      .page {
        padding: 64px 20px 80px;
      }

      h1 {
        font-size: 30px;
      }

      .bio {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="image-wrap">
      <img src="your-photo.jpg" alt="Image of Junyu Fan" />
    </div>

    <div class="text">
      <h1>Junyu Fan</h1>

      <p class="subtitle">
        MD student currently based in Heidelberg
      </p>

      <p class="bio">
        Interested in psychiatry, psychotherapy, and the intersection of mind and
        philosophy. Exploring human experience through medicine and the humanities.
      </p>
    </div>

  </main>
</body>
</html>
